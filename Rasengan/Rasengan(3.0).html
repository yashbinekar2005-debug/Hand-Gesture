<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobi AR: Rasengan Protocol</title>
    <style>
        :root {
            --cyan: #00e5ff;
            --blue: #2979ff;
            --dark: #050a0f;
            --panel: rgba(5, 15, 25, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark);
            font-family: 'orbitron', sans-serif;
            color: white; overflow: hidden;
        }

        #app-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* Mirrored Video Feed */
        #webcam, #output_canvas {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Cyberpunk UI Layer */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box;
        }

        .hud-top {
            display: flex; justify-content: space-between; width: 100%;
        }

        .hand-status {
            background: var(--panel);
            border-left: 4px solid var(--cyan);
            padding: 15px; width: 250px;
            backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.3s;
        }

        .hand-status.active { opacity: 1; }

        .progress-container {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.1);
            margin-top: 10px; position: relative;
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--cyan));
            box-shadow: 0 0 10px var(--cyan);
            transition: width 0.1s linear;
        }

        #overlay-start {
            position: absolute; z-index: 20;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: all;
        }

        button {
            background: transparent; color: var(--cyan);
            border: 2px solid var(--cyan);
            padding: 15px 40px; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
            letter-spacing: 4px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        button:hover {
            background: var(--cyan); color: var(--dark);
            box-shadow: 0 0 30px var(--cyan);
        }

        .label { font-size: 0.7rem; color: var(--cyan); letter-spacing: 2px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="overlay-start">
        <h1 style="letter-spacing: 10px;">RASENGAN PROTOCOL</h1>
        <button id="initBtn">Start Shinobi System</button>
    </div>

    <div id="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div id="ui-layer">
            <div class="hud-top">
                <div id="hud-hand-0" class="hand-status">
                    <div class="label">LEFT CHAKRA CHANNEL</div>
                    <div class="progress-container"><div id="bar-0" class="progress-bar"></div></div>
                </div>
                <div id="hud-hand-1" class="hand-status">
                    <div class="label">RIGHT CHAKRA CHANNEL</div>
                    <div class="progress-container"><div id="bar-1" class="progress-bar"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MediaPipe Scripts -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const initBtn = document.getElementById("initBtn");
        const overlay = document.getElementById("overlay-start");

        let handLandmarker;
        let lastVideoTime = -1;
        
        // Hand state tracking
        const handStates = new Map(); // Tracks meta-data per hand index
        let particles = [];

        async function initialize() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2
            });
            setupCamera();
        }

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                overlay.style.display = "none";
                renderLoop();
            };
        }

        function createParticles(x, y, radius, handId) {
            for (let i = 0; i < 3; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = radius * (2 + Math.random());
                particles.push({
                    x, y,
                    angle,
                    dist,
                    speed: 2 + Math.random() * 4,
                    size: 1 + Math.random() * 2,
                    handId
                });
            }
        }

        function drawRasengan(x, y, baseRadius, elapsed, handId) {
            let growth = 1.0;
            const chargeTime = 3000; // 3 seconds
            
            if (elapsed > chargeTime) {
                // Growth from 1.0 to 3.0 over the next 5 seconds
                growth = Math.min(3.0, 1.0 + (elapsed - chargeTime) / 2500);
            }

            const r = baseRadius * growth;
            const time = performance.now() * 0.005;

            ctx.save();
            ctx.translate(x, y);
            ctx.globalCompositeOperation = 'lighter';
            
            // 1. Shadow Glow
            ctx.shadowBlur = 35;
            ctx.shadowColor = '#00e5ff';

            // 2. Swirling Arcs
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.rotate(time * (i + 1) * 0.1);
                ctx.lineWidth = 2 * growth;
                ctx.strokeStyle = `rgba(0, 229, 255, ${0.4 + (i * 0.1)})`;
                ctx.ellipse(0, 0, r * 0.8, r * (0.3 + i * 0.1), 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 3. Inner White Core
            const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.6);
            coreGrad.addColorStop(0, '#ffffff');
            coreGrad.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
            coreGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // 4. Update HUD Progress Bar
            const bar = document.getElementById(`bar-${handId}`);
            const statusBox = document.getElementById(`hud-hand-${handId}`);
            statusBox.classList.add('active');
            const progress = Math.min(100, (elapsed / chargeTime) * 100);
            bar.style.width = `${progress}%`;
            if (progress === 100) bar.style.boxShadow = "0 0 20px #fff";

            // Spawn Particles
            createParticles(x, y, r, handId);
        }

        function updateParticles() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.dist -= p.speed; // Spiral inward
                p.angle += 0.15;
                
                const px = p.x + Math.cos(p.angle) * p.dist;
                const py = p.y + Math.sin(p.angle) * p.dist;

                ctx.fillStyle = '#00e5ff';
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.dist < 5) particles.splice(i, 1);
            }
            ctx.restore();
        }

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                // Track active hands to reset HUD for missing hands
                const activeIndices = new Set();

                if (results.landmarks) {
                    results.landmarks.forEach((landmarks, index) => {
                        activeIndices.add(index);
                        
                        if (!handStates.has(index)) {
                            handStates.set(index, { startTime: Date.now() });
                        }

                        const state = handStates.get(index);
                        const elapsed = Date.now() - state.startTime;

                        // Landmark 0: Wrist, Landmark 9: Middle MCP
                        const wrist = landmarks[0];
                        const mcp = landmarks[9];

                        // Convert Normalized to Pixel Coordinates
                        const x = mcp.x * canvas.width;
                        const y = mcp.y * canvas.height;

                        // Calculate Euclidean Distance for Base Size
                        const baseSize = Math.hypot(
                            (wrist.x - mcp.x) * canvas.width,
                            (wrist.y - mcp.y) * canvas.height
                        );

                        drawRasengan(x, y, baseSize * 0.8, elapsed, index);
                    });
                }

                // Reset logic for hands that left the frame
                [0, 1].forEach(i => {
                    if (!activeIndices.has(i)) {
                        handStates.delete(i);
                        document.getElementById(`hud-hand-${i}`).classList.remove('active');
                        document.getElementById(`bar-${i}`).style.width = "0%";
                    }
                });
            }

            updateParticles();
            requestAnimationFrame(renderLoop);
        }

        initBtn.addEventListener("click", initialize);

    </script>
</body>
</html>
