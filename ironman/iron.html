<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Mark 85: Nanotech Assembly</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { transform: scaleX(-1); position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        .hud { position: absolute; top: 30px; left: 30px; z-index: 20; color: #00d2ff; width: 280px; }
        .bar { width: 100%; height: 4px; background: rgba(0, 70, 140, 0.3); border: 1px solid #00d2ff; margin: 10px 0; }
        .fill { height: 100%; width: 0%; background: #00d2ff; transition: width 0.1s; box-shadow: 0 0 10px #00d2ff; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="container">
    <video id="input_video"></video>
    <div class="hud">
        <div style="font-size: 10px; letter-spacing: 2px;">BIOMETRIC SCAN</div>
        <div class="bar"><div id="scan-bar" class="fill"></div></div>
        <div style="font-size: 10px; letter-spacing: 2px; margin-top: 15px;">NANOTECH DEPLOYMENT</div>
        <div class="bar"><div id="suit-bar" class="fill"></div></div>
        <div id="status" style="font-size: 12px; margin-top: 5px;">INITIALIZING...</div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const MODEL_URL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/RiggedFigure/glTF-Binary/RiggedFigure.glb'; // Replace with a Mark85 GLB for best results

let scene, camera, renderer, particles, particleMat;
let suitState = "IDLE"; 
let suitProgress = 0;
let modelVertices = [];
let smoothedChest = new THREE.Vector3();

// --- SHADERS ---
const vertexShader = `
    varying vec3 vColor;
    attribute vec3 targetPos;
    uniform float uProgress;
    uniform float uTime;
    void main() {
        float angle = uTime * 4.0 + position.y * 10.0;
        vec3 idlePos = vec3(cos(angle)*0.1, position.y * 0.1, sin(angle)*0.1);
        vec3 finalPos = mix(idlePos, targetPos, uProgress);
        vColor = mix(vec3(0.0, 0.7, 1.0), vec3(0.8, 0.1, 0.1), uProgress);
        vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
        gl_PointSize = (15.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragmentShader = `
    varying vec3 vColor;
    void main() {
        if (distance(gl_PointCoord, vec2(0.5)) > 0.5) discard;
        gl_FragColor = vec4(vColor, 1.0);
    }
`;

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    // Load Model to get "Suit Shape"
    new THREE.GLTFLoader().load(MODEL_URL, (gltf) => {
        gltf.scene.traverse(child => {
            if (child.isMesh) {
                const posArr = child.geometry.attributes.position.array;
                for (let i = 0; i < posArr.length; i += 3) {
                    modelVertices.push(new THREE.Vector3(posArr[i], posArr[i+1], posArr[i+2]));
                }
            }
        });
        createParticles();
        document.getElementById('status').innerText = "SYSTEMS READY";
    });
}

function createParticles() {
    const count = 10000; // 10k Nanotech Particles
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const tar = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        pos[i*3] = (Math.random()-0.5)*0.1;
        pos[i*3+1] = (Math.random()-0.5)*0.1;
        pos[i*3+2] = (Math.random()-0.5)*0.1;
        
        // Pick a random vertex from the real suit model
        const v = modelVertices[Math.floor(Math.random() * modelVertices.length)];
        tar[i*3] = v.x; tar[i*3+1] = v.y; tar[i*3+2] = v.z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geometry.setAttribute('targetPos', new THREE.BufferAttribute(tar, 3));

    particleMat = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: { uProgress: { value: 0 }, uTime: { value: 0 } },
        transparent: true, blending: THREE.AdditiveBlending
    });

    particles = new THREE.Points(geometry, particleMat);
    scene.add(particles);
    animate();
}

function onResults(results) {
    if (!results.poseLandmarks || !particles) return;
    const lm = results.poseLandmarks;
    document.getElementById('scan-bar').style.width = "100%";

    // 1. Position Particles to Chest
    const cX = (0.5 - (lm[11].x + lm[12].x) / 2) * 6;
    const cY = (0.5 - (lm[11].y + lm[12].y) / 2) * 6;
    smoothedChest.lerp(new THREE.Vector3(cX, cY, 0), 0.15);
    particles.position.copy(smoothedChest);

    // 2. Adaptive Scaling
    const sWidth = Math.abs(lm[11].x - lm[12].x);
    const scale = sWidth * 10;
    particles.scale.set(scale, scale, scale);

    // 3. Gesture Detection
    const wrist = lm[16];
    const chest = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
    const dist = Math.hypot(wrist.x - chest.x, wrist.y - chest.y);

    if (dist < 0.1 && suitState === "IDLE") suitState = "DEPLOYING";
}

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    if (particleMat) particleMat.uniforms.uTime.value = time;

    if (suitState === "DEPLOYING") {
        suitProgress += (1 / (15 * 60)); // 15 Seconds
        if (suitProgress >= 1) { suitProgress = 1; suitState = "ACTIVE"; }
        document.getElementById('suit-bar').style.width = (suitProgress * 100) + "%";
        document.getElementById('status').innerText = "ASSEMBLING MARK 85...";
    }

    if (particleMat) particleMat.uniforms.uProgress.value = suitProgress;
    renderer.render(scene, camera);
}

// MediaPipe Setup
const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
pose.onResults(onResults);
new Camera(document.getElementById('input_video'), {
    onFrame: async () => { await pose.send({image: document.getElementById('input_video')}); },
    width: 1280, height: 720
}).start();

initThree();
</script>
</body>
</html>
