<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Solar System</title>
    
    <!-- Tailwind CSS (for UI) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Hands & Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI Overlay */
        #ui-layer { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        /* Webcam Feed (Hidden but active) */
        .input_video { position: absolute; bottom: 0; right: 0; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 50; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s ease;
        }
        
        .gesture-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="text-2xl font-bold mb-4 tracking-widest text-blue-400">INITIALIZING SYSTEMS</div>
        <div class="text-sm text-gray-400">Loading AI Models & 3D Assets...</div>
        <div class="mt-4 text-xs text-gray-500">Please allow camera access when prompted</div>
    </div>

    <!-- Hidden Video Element for MediaPipe -->
    <video class="input_video"></video>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col justify-between p-6">
        
        <!-- Header / Planet Name -->
        <div class="w-full text-center mt-4">
            <h1 id="planet-name" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-purple-500 drop-shadow-lg tracking-widest uppercase transition-all duration-300">
                EARTH
            </h1>
            <p id="status-text" class="text-sm text-blue-200 mt-2 font-mono">ORBITING NORMAL</p>
        </div>

        <!-- Gesture Guide -->
        <div class="gesture-card rounded-xl p-4 w-64 self-end mb-4 pointer-events-auto">
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-3 border-b border-gray-600 pb-1">Command Module</h3>
            
            <div id="guide-open" class="flex items-center gap-3 mb-2 opacity-50 transition-opacity">
                <div class="w-8 h-8 bg-gray-700 rounded flex items-center justify-center text-xs">🖐️</div>
                <div>
                    <div class="text-xs font-bold">OPEN PALM</div>
                    <div class="text-[10px] text-gray-300">Next Planet</div>
                </div>
            </div>

            <div id="guide-fist" class="flex items-center gap-3 mb-2 opacity-50 transition-opacity">
                <div class="w-8 h-8 bg-gray-700 rounded flex items-center justify-center text-xs">✊</div>
                <div>
                    <div class="text-xs font-bold">CLOSED FIST</div>
                    <div class="text-[10px] text-gray-300">Zoom In + Turbo</div>
                </div>
            </div>

            <div id="guide-peace" class="flex items-center gap-3 opacity-50 transition-opacity">
                <div class="w-8 h-8 bg-gray-700 rounded flex items-center justify-center text-xs">✌️</div>
                <div>
                    <div class="text-xs font-bold">PEACE SIGN</div>
                    <div class="text-[10px] text-gray-300">Reset View</div>
                </div>
            </div>
            
            <div class="mt-4 pt-2 border-t border-gray-600">
                <p class="text-[10px] text-gray-400 font-mono">DETECTED: <span id="detected-gesture" class="text-yellow-400">NONE</span></p>
            </div>
        </div>
    </div>

    <!-- 3D Container -->
    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURATION ---
        const config = {
            cameraSmoothness: 0.05,
            orbitSpeedBase: 0.5,
            zoomSpeed: 2.0, // multiplier
            debounceTime: 1000, // ms between planet switches
        };

        // --- GLOBAL STATE ---
        let scene, camera, renderer;
        let sun, planets = [], stars;
        let currentPlanetIndex = 0; // 0=Earth, 1=Mars, 2=Jupiter, 3=Saturn
        let orbitSpeedMultiplier = 1;
        let isZoomed = false;
        let lastGestureTime = 0;
        
        // --- 3D SETUP ---
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 20, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 1.5, 300);
            scene.add(sunLight);

            createSceneObjects();
            animate();
        }

        function createSceneObjects() {
            // 1. Sun
            const sunGeo = new THREE.SphereGeometry(8, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
            sun = new THREE.Mesh(sunGeo, sunMat);
            // Add a glow effect wrapper
            const sunGlowGeo = new THREE.SphereGeometry(8.5, 32, 32);
            const sunGlowMat = new THREE.MeshBasicMaterial({ color: 0xFFAA00, transparent: true, opacity: 0.3 });
            sun.add(new THREE.Mesh(sunGlowGeo, sunGlowMat));
            scene.add(sun);

            // 2. Planets Data
            const planetData = [
                { name: "EARTH", color: 0x2233ff, size: 2, distance: 30, speed: 0.005 },
                { name: "MARS", color: 0xff3311, size: 1.5, distance: 45, speed: 0.004 },
                { name: "JUPITER", color: 0xd8ca9d, size: 5, distance: 70, speed: 0.002 },
                { name: "SATURN", color: 0xc5a16f, size: 4.5, distance: 95, speed: 0.0015, hasRing: true }
            ];

            planetData.forEach((data, index) => {
                // Orbit Group (Pivot)
                const orbitGroup = new THREE.Group();
                scene.add(orbitGroup);

                // Orbit Trail (Visual Line)
                const trailGeo = new THREE.RingGeometry(data.distance - 0.1, data.distance + 0.1, 64);
                const trailMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
                const trail = new THREE.Mesh(trailGeo, trailMat);
                trail.rotation.x = Math.PI / 2;
                scene.add(trail);

                // Planet Mesh
                const geo = new THREE.SphereGeometry(data.size, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: data.color, 
                    shininess: 10 
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.x = data.distance;

                // Saturn Ring
                if (data.hasRing) {
                    const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 32);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0x998877, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    mesh.add(ring);
                }

                orbitGroup.add(mesh);
                
                planets.push({
                    mesh: mesh,
                    group: orbitGroup,
                    data: data,
                    angle: Math.random() * Math.PI * 2
                });
            });

            // 3. Stars Background
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 2000;
            const posArray = new Float32Array(starsCount * 3);
            
            for(let i = 0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 500;
            }
            
            starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMat = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff });
            stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotate Planets
            planets.forEach(p => {
                // Self rotation
                p.mesh.rotation.y += 0.01;
                
                // Orbit rotation
                const currentSpeed = p.data.speed * config.orbitSpeedBase * orbitSpeedMultiplier;
                p.group.rotation.y += currentSpeed;
            });

            // Camera Logic
            updateCamera();

            renderer.render(scene, camera);
        }

        function updateCamera() {
            const targetPlanet = planets[currentPlanetIndex];
            
            // Calculate absolute position of the planet
            const vector = new THREE.Vector3();
            targetPlanet.mesh.getWorldPosition(vector);

            // Determine desired camera offset
            let offsetDistance = isZoomed ? targetPlanet.data.size * 3 : targetPlanet.data.size * 6 + 10;
            let heightOffset = isZoomed ? 2 : 10;

            // Camera target position (Behind and above planet)
            // We find the position relative to the orbit group rotation
            const angle = targetPlanet.group.rotation.y;
            const camX = vector.x + Math.sin(angle) * offsetDistance; // Simple offset calculation
            const camZ = vector.z + Math.cos(angle) * offsetDistance;

            const targetPos = new THREE.Vector3(
                vector.x + Math.cos(angle) * offsetDistance, // Just pushing camera out relative to center
                vector.y + heightOffset,
                vector.z + Math.sin(angle) * offsetDistance 
            );
            
            // To make it look "behind" the planet relative to orbit, we use simple trig based on group rotation
            // Actually, simplest way: Position camera relative to planet's local coordinates transformed to world
            
            // Simpler approach for smooth follow:
            // Desired position is the Planet Position + Offset Vector
            const desiredPosition = vector.clone().add(new THREE.Vector3(10, heightOffset, 10)); // Fixed diagonal offset for simplicity
            
            // Actually let's do a dynamic offset based on orbit
            const offsetX = Math.cos(targetPlanet.group.rotation.y) * offsetDistance;
            const offsetZ = Math.sin(targetPlanet.group.rotation.y) * offsetDistance;

            // Target camera position
            const finalCamPos = new THREE.Vector3(
                vector.x + offsetX,
                vector.y + heightOffset,
                vector.z + offsetZ
            );

            // Smooth Lerp
            camera.position.lerp(finalCamPos, config.cameraSmoothness);
            
            // Smooth LookAt (using a dummy object or just lerping the quaternion is better, 
            // but lookAt every frame with lerped position works okay for this scope)
            camera.lookAt(vector);
        }

        // --- MEDIAPIPE LOGIC ---
        
        function onResults(results) {
            // Hide Loader once hand is detected or feed runs
            const loader = document.getElementById('loader');
            if(loader && loader.style.display !== 'none') {
                loader.style.opacity = 0;
                setTimeout(() => loader.style.display = 'none', 500);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                detectGesture(landmarks);
            } else {
                updateGestureUI("NONE");
            }
        }

        function detectGesture(landmarks) {
            // Finger indices in MediaPipe
            // Thumb: 1-4, Index: 5-8, Middle: 9-12, Ring: 13-16, Pinky: 17-20
            
            const isFingerExtended = (tip, pip) => {
                // Simple distance check from wrist (0)
                // If tip is further from wrist than pip (knuckle), it's likely extended
                // This is a rough heuristic suitable for basic web use
                const wrist = landmarks[0];
                const tipPos = landmarks[tip];
                const pipPos = landmarks[pip];
                
                const dTip = Math.hypot(tipPos.x - wrist.x, tipPos.y - wrist.y);
                const dPip = Math.hypot(pipPos.x - wrist.x, pipPos.y - wrist.y);
                
                return dTip > dPip;
            };

            const thumbOpen = isFingerExtended(4, 2);
            const indexOpen = isFingerExtended(8, 6);
            const middleOpen = isFingerExtended(12, 10);
            const ringOpen = isFingerExtended(16, 14);
            const pinkyOpen = isFingerExtended(20, 18);

            const fingersOpenCount = [thumbOpen, indexOpen, middleOpen, ringOpen, pinkyOpen].filter(Boolean).length;

            let gesture = "UNKNOWN";

            // LOGIC MAPPING
            if (fingersOpenCount === 5) {
                gesture = "OPEN_PALM";
            } else if (fingersOpenCount === 0) {
                gesture = "CLOSED_FIST";
            } else if (indexOpen && middleOpen && !ringOpen && !pinkyOpen) {
                gesture = "PEACE";
            }

            handleGestureAction(gesture);
            updateGestureUI(gesture);
        }

        function handleGestureAction(gesture) {
            const now = Date.now();

            // 1. Next Planet (Debounced)
            if (gesture === "OPEN_PALM") {
                if (now - lastGestureTime > config.debounceTime) {
                    currentPlanetIndex = (currentPlanetIndex + 1) % planets.length;
                    updatePlanetUI();
                    lastGestureTime = now;
                }
            }

            // 2. Zoom & Fast (Continuous state)
            if (gesture === "CLOSED_FIST") {
                isZoomed = true;
                orbitSpeedMultiplier = config.zoomSpeed; // Fast spin
            } 
            // 3. Reset (Continuous state check)
            else if (gesture === "PEACE") {
                isZoomed = false;
                orbitSpeedMultiplier = 1; // Normal speed
            }
            // Default behavior if hand lost or other gesture
            else {
                // Optional: Maintain last state or reset? 
                // Let's keep zoomed state until Peace sign is shown to unlock, 
                // but reset speed if fist is released.
                if(gesture !== "CLOSED_FIST") {
                    orbitSpeedMultiplier = 1;
                }
            }
        }

        // --- UI UPDATES ---
        function updatePlanetUI() {
            const planet = planets[currentPlanetIndex];
            document.getElementById('planet-name').innerText = planet.data.name;
        }

        function updateGestureUI(gesture) {
            const label = document.getElementById('detected-gesture');
            label.innerText = gesture;
            
            // Highlight active guide
            const guideOpen = document.getElementById('guide-open');
            const guideFist = document.getElementById('guide-fist');
            const guidePeace = document.getElementById('guide-peace');

            guideOpen.style.opacity = gesture === "OPEN_PALM" ? "1" : "0.5";
            guideOpen.style.color = gesture === "OPEN_PALM" ? "#60a5fa" : "white";

            guideFist.style.opacity = gesture === "CLOSED_FIST" ? "1" : "0.5";
            guideFist.style.color = gesture === "CLOSED_FIST" ? "#f87171" : "white";

            guidePeace.style.opacity = gesture === "PEACE" ? "1" : "0.5";
            guidePeace.style.color = gesture === "PEACE" ? "#4ade80" : "white";
            
            // Update Status Text based on modifiers
            const status = document.getElementById('status-text');
            if (isZoomed && orbitSpeedMultiplier > 1) status.innerText = "ZOOM LOCKED | TURBO SPEED";
            else if (isZoomed) status.innerText = "ZOOM LOCKED";
            else status.innerText = "ORBITING NORMAL";
        }

        // --- INITIALIZATION ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThreeJS();

        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const videoElement = document.querySelector('.input_video');
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        cameraUtils.start();

    </script>
</body>
</html>
