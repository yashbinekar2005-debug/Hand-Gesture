<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Style: Rasenshuriken AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }

        /* Naruto Themed UI */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        #header {
            margin-top: 20px;
            text-align: center;
            color: #ff9d00;
            text-shadow: 0 0 20px #ff0000, 2px 2px #000;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        #btn-start {
            pointer-events: auto;
            margin-bottom: 100px;
            padding: 20px 50px;
            background: linear-gradient(45deg, #ff4e00, #ff9d00);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 78, 0, 0.6);
            transition: 0.3s;
            border: 2px solid #fff;
        }

        #btn-start:hover { transform: scale(1.1); box-shadow: 0 0 50px #ff4e00; }

        .charge-bars {
            display: flex;
            width: 80%;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .bar-container { width: 300px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #0ff; }
        .bar-fill { width: 0%; height: 100%; background: #0ff; box-shadow: 0 0 15px #0ff; transition: width 0.1s; }
    </style>
</head>
<body>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div id="header">WIND STYLE: RASENSHURIKEN</div>
        
        <button id="btn-start">INITIALIZE CHAKRA</button>

        <div class="charge-bars">
            <div><div class="bar-container"><div id="fill-0" class="bar-fill"></div></div></div>
            <div><div class="bar-container"><div id="fill-1" class="bar-fill"></div></div></div>
        </div>
    </div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('btn-start');

    let handStates = [
        { charge: 0, active: false, x: 0, y: 0, size: 0 },
        { charge: 0, active: false, x: 0, y: 0, size: 0 }
    ];

    const MAX_CHARGE = 60; // Approx 2 seconds at 30fps
    let screenShake = 0;

    function onResults(results) {
        // MATCH CANVAS TO WINDOW
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        canvasCtx.save();
        
        // 1. SCREEN SHAKE EFFECT
        if (screenShake > 0) {
            canvasCtx.translate(Math.random() * screenShake - screenShake/2, Math.random() * screenShake - screenShake/2);
            screenShake *= 0.9;
        }

        // 2. DRAW CAMERA FEED (Crucial: This fixes the black screen)
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        // Reset state activity
        handStates.forEach(h => h.active = false);

        if (results.multiHandLandmarks) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = results.multiHandedness[i].label === 'Left' ? 0 : 1;
                const state = handStates[handedness];

                // Anchor Point: Palm (Landmark 9)
                state.x = landmarks[9].x * canvasElement.width;
                state.y = landmarks[9].y * canvasElement.height;
                
                // Dynamic Scaling (Wrist to Middle Finger MCP)
                const dx = (landmarks[0].x - landmarks[9].x) * canvasElement.width;
                const dy = (landmarks[0].y - landmarks[9].y) * canvasElement.height;
                state.size = Math.sqrt(dx*dx + dy*dy) * 1.5;

                state.active = true;
                state.charge = Math.min(MAX_CHARGE, state.charge + 1);

                

                // Update UI
                document.getElementById(`fill-${handedness}`).style.width = (state.charge / MAX_CHARGE * 100) + '%';
                
                if (state.charge === MAX_CHARGE - 1) screenShake = 20; // Trigger shake on evolution

                drawJutsu(state);
            }
        }

        // Decay charge if hand is lost
        handStates.forEach((h, index) => {
            if (!h.active) {
                h.charge = Math.max(0, h.charge - 2);
                document.getElementById(`fill-${index}`).style.width = (h.charge / MAX_CHARGE * 100) + '%';
            }
        });

        canvasCtx.restore();
    }

    function drawJutsu(state) {
        const { x, y, size, charge } = state;
        const isRasenshuriken = charge >= MAX_CHARGE;
        const time = Date.now() * 0.005;

        // canvasCtx.globalCompositeOperation = 'lighter';

        // --- LAYER 1: THE CORE RASENGAN ---
        const coreGrad = canvasCtx.createRadialGradient(x, y, 0, x, y, size);
        
        coreGrad.addColorStop(0, '#fff');
        coreGrad.addColorStop(0.2, '#87CEEB');
        // coreGrad.addColorStop(0.5, 'rgba(0, 100, 255, 0.3)');
         coreGrad.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
        coreGrad.addColorStop(1, 'transparent');

        canvasCtx.fillStyle = coreGrad;
        canvasCtx.beginPath();
        canvasCtx.arc(x, y, size, 0, Math.PI * 2);
        canvasCtx.fill();

        // --- LAYER 2: INTERNAL SWIRL (CHAOTIC CHAKRA) ---
        // canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        // // canvasCtx.strokeStyle='rgba(0, 229, 255, ${0.4 + (i * 0.1)})'
        // canvasCtx.lineWidth = 2;
        // for (let i = 0; i < 5; i++) {
        //     canvasCtx.beginPath();
        //     const r = size * (0.4 + Math.random() * 0.4);
        //     const rot = time * (i + 1);
        //     canvasCtx.ellipse(x, y, r, r * 0.4, rot, 0, Math.PI * 2);
        //     canvasCtx.stroke();
        // }
 // 2. Swirling Chakra (Dense Sphere)
        const numLines = 80; // Significantly increased for density
        canvasCtx.lineWidth = 0.6; // Very fine lines
        
        // Add a glow effect to the lines
        canvasCtx.shadowBlur = 20;
        canvasCtx.shadowColor = '#00e5ff'; // Bright cyan glow

        for (let i = 0; i < numLines; i++) {
            canvasCtx.beginPath();
            // Vary opacity to create depth
            canvasCtx.strokeStyle = `rgba(220, 255, 255, ${0.2 + Math.random() * 0.6})`;
            
            // Radius mostly stays within the sphere's bounds
            const rX = size * (0.95 + Math.random() * 0.1);
            // Randomize Y-radius to simulate lines wrapping around a 3D sphere
            const rY = rX * (0.1 + Math.random() * 0.9);
            
            // Chaotic, high-speed rotation for each line
            // Using a large multiplier for speed and 'i' for unique offsets
            const rot = time * (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 3) + i;
            
            // Draw the ellipse
            canvasCtx.ellipse(x, y, rX, rY, rot, 0, Math.PI * 2);
            canvasCtx.stroke();
        }
        // Reset shadow so it doesn't affect other parts
        canvasCtx.shadowBlur = 0;
        // --- LAYER 3: RASENSHURIKEN BLADES (STRETCHED SCYTHES) ---
        if (isRasenshuriken) {
            const bladeCount = 4;
            const bladeLength = size * 4;
            const rotation = Date.now() * 0.08; // Super fast rotation

            canvasCtx.save();
            canvasCtx.translate(x, y);
            canvasCtx.rotate(rotation);

            for (let i = 0; i < bladeCount; i++) {
                canvasCtx.rotate((Math.PI * 2) / bladeCount);
                
                // Draw Sharp Blade Geometry
                canvasCtx.beginPath();
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                canvasCtx.shadowBlur = 35;
                canvasCtx.shadowColor = '#00e5ff';
                
                canvasCtx.moveTo(0, 0);
                // The "Scythe" curve
                canvasCtx.bezierCurveTo(bladeLength * 0.3, -bladeLength * 0.2, bladeLength * 0.7, -bladeLength * 0.3, bladeLength, 0);
                canvasCtx.bezierCurveTo(bladeLength * 0.5, bladeLength * 0.1, bladeLength * 0.2, bladeLength * 0.1, 0, 0);
                canvasCtx.fill();

                // Wind Streaks
                canvasCtx.strokeStyle = 'rgba(255,255,255,0.4)';
                canvasCtx.lineWidth = 5;
                canvasCtx.stroke();
            }
            canvasCtx.restore();

            // High-speed wind particles
            drawParticles(x, y, size);
        }
    }

    function drawParticles(x, y, size) {
        for (let i = 0; i < 5; i++) {
            const ang = Math.random() * Math.PI * 2;
            const len = size * (2 + Math.random() * 3);
            canvasCtx.strokeStyle = '#fff';
            canvasCtx.lineWidth = 1;
            canvasCtx.beginPath();
            canvasCtx.moveTo(x + Math.cos(ang) * size, y + Math.sin(ang) * size);
            canvasCtx.lineTo(x + Math.cos(ang) * len, y + Math.sin(ang) * len);
            canvasCtx.stroke();
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        camera.start();
    });

</script>
</body>
</html>
