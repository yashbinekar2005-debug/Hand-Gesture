<!DOCTYPE html>
<html lang="en">

            margin-top: 20px;

            color: #ff9d00;
            text-shadow: 0 0 20px #ff0000, 2px 2px #000;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        #btn-start {
            pointer-events: auto;
            margin-bottom: 100px;
            padding: 20px 50px;
            background: linear-gradient(45deg, #ff4e00, #ff9d00);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;

            box-shadow: 0 0 30px rgba(255, 78, 0, 0.6);

            border: 2px solid #fff;

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('btn-start');

    let handStates = [

    const GROWTH_START = 90;

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        canvasCtx.save();
        
        if (screenShake > 0) {
            canvasCtx.translate(Math.random() * screenShake - screenShake/2, Math.random() * screenShake - screenShake/2);
            screenShake *= 0.9;
        }

        // Draw camera feed
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        handStates.forEach(h => h.active = false);

        if (results.multiHandLandmarks) {

                const landmarks = results.multiHandLandmarks[i];

                const state = handStates[handedness];

                state.x = landmarks[9].x * canvasElement.width;
                state.y = landmarks[9].y * canvasElement.height;
                
                // Calculate Base Hand Size
                const dx = (landmarks[0].x - landmarks[9].x) * canvasElement.width;
                const dy = (landmarks[0].y - landmarks[9].y) * canvasElement.height;
                state.baseSize = Math.sqrt(dx*dx + dy*dy) * 1.5;

                state.active = true;
                state.charge = Math.min(MAX_CHARGE, state.charge + 1);

                // Growth Logic
                let multiplier = 1.0;
                if (state.charge > GROWTH_START) {
                    const progress = (state.charge - GROWTH_START) / (MAX_CHARGE - GROWTH_START);
                    multiplier = 1.0 + progress; // Scaled up to 2.0x
                    screenShake = 2; // Subtle vibration during growth

                state.size = state.baseSize * multiplier;

                // Update UI Progress Bar
                document.getElementById(`fill-${handedness}`).style.width = (state.charge / MAX_CHARGE * 100) + '%';
                
                drawRasengan(state);
            }
        }

        handStates.forEach((h, index) => {
            if (!h.active) {
                h.charge = Math.max(0, h.charge - 2);
                document.getElementById(`fill-${index}`).style.width = (h.charge / MAX_CHARGE * 100) + '%';
            }
        });

        canvasCtx.restore();
    }

        coreGrad.addColorStop(1, 'transparent');

        canvasCtx.fill();

        // }

        // // 2. Swirling Chakra (Dense Sphere)

        // for (let i = 0; i < numLines; i++) {

        //     // Vary opacity to create depth
        //     canvasCtx.strokeStyle = `rgba(220, 255, 255, ${0.2 + Math.random() * 0.6})`;
            
        //     // Radius mostly stays within the sphere's bounds

        //     // Randomize Y-radius to simulate lines wrapping around a 3D sphere
        //     const rY = rX * (0.1 + Math.random() * 0.9);
            
        //     // Chaotic, high-speed rotation for each line

        //     const rot = time * (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 3) + i;
            
        //     // Draw the ellipse
        //     canvasCtx.ellipse(x, y, rX, rY, rot, 0, Math.PI * 2);
        //     canvasCtx.stroke();
        // }
        // // Reset shadow so it doesn't affect other parts

        // 2. Swirling Chakra (Dense Sphere) - TIGHT CIRCUMFERENCE
const numLines = 80; // Significantly increased for density
canvasCtx.lineWidth = 0.6; // Very fine lines

// Add a glow effect to the lines
canvasCtx.shadowBlur = 20;
canvasCtx.shadowColor = '#00e5ff'; // Bright cyan glow

for (let i = 0; i < numLines; i++) {
    canvasCtx.beginPath();
    // Vary opacity to create depth
    canvasCtx.strokeStyle = `rgba(220, 255, 255, ${0.2 + Math.random() * 0.6})`;
    
    // RADIUS ADJUSTED: Concentrated to be slightly bigger than the inner globe (1.02x to 1.07x)
    const rX = size * (0.5 + Math.random() * 0.05);
    
    // Randomize Y-radius to simulate lines wrapping around a 3D sphere
    const rY = rX * (0.1 + Math.random() * 0.9);
    
    // Chaotic, high-speed rotation for each line
    const rot = time * (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 3) + i;
    
    // Draw the ellipse
    canvasCtx.ellipse(x, y, rX, rY, rot, 0, Math.PI * 2);
    canvasCtx.stroke();
}
// Reset shadow so it doesn't affect other parts
canvasCtx.shadowBlur = 0;

        // 3. Suction Particles
        drawParticles(x, y, size);
    }

    function drawParticles(x, y, size) {
        for (let i = 0; i < 5; i++) {
            const ang = Math.random() * Math.PI * 2;
            const len = size * (1.5 + Math.random() * 0.5);
            canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
