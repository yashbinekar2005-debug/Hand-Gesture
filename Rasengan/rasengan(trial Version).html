<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Naruto Rasengan AR</title>
    <style>
        :root {
            --chakra-main: #00d4ff;
            --chakra-core: #ffffff;
            --chakra-glow: rgba(0, 212, 255, 0.6);
            --bg-dark: #010409;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #video-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* Mirror the view for natural interaction */
        video, canvas {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--chakra-main);
            color: var(--chakra-main);
            padding: 10px 20px; border-radius: 5px;
            font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase; width: fit-content;
        }

        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white;
        }

        button {
            background: transparent; color: white;
            border: 2px solid var(--chakra-main);
            padding: 15px 40px; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--chakra-glow);
        }

        button:hover {
            background: var(--chakra-main);
            box-shadow: 0 0 40px var(--chakra-main);
            color: black;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="letter-spacing: 10px; text-align: center;">RASENGAN ENGINE</h1>
        <button id="startBtn">INITIALIZE CHAKRA</button>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="ui-layer">
            <div class="status-badge" id="status">System Standby</div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");
        const statusBadge = document.getElementById("status");

        let handLandmarker;
        let lastVideoTime = -1;
        let particles = [];

        // Anime Animation Variables
        let rotationAngle = 0;

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2
            });
            startBtn.addEventListener("click", startCamera);
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById("start-overlay").style.display = "none";
                statusBadge.innerText = "Chakra Detected: Active";
                renderLoop();
            };
        }

        function drawAnimeRasengan(x, y, radius) {
            rotationAngle += 0.2; // High speed rotation
            
            ctx.save();
            ctx.translate(x, y);
            ctx.globalCompositeOperation = 'lighter';

            // 1. OUTER AURA (The Blue Glow Shell)
            const aura = ctx.createRadialGradient(0, 0, radius * 0.5, 0, 0, radius * 1.1);
            aura.addColorStop(0, 'rgba(0, 212, 255, 0.4)');
            aura.addColorStop(1, 'rgba(0, 100, 255, 0)');
            ctx.fillStyle = aura;
            ctx.beginPath();
            ctx.arc(0, 0, radius * 1.1, 0, Math.PI * 2);
            ctx.fill();

            // 2. TURBULENT CHAKRA THREADS (Erratic Spirals)
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00f2ff';
            
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.rotate(rotationAngle * (i * 0.15 + 1));
                ctx.strokeStyle = `rgba(180, 245, 255, ${0.4 + (i * 0.05)})`;
                ctx.lineWidth = 2.5;
                
                // Draw erratic, compressed circular paths
                ctx.ellipse(0, 0, radius * 0.95, radius * (0.1 + i * 0.1), 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 3. INNER CORE (High Density White)
            const core = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.5);
            core.addColorStop(0, '#ffffff');
            core.addColorStop(0.3, '#ffffff');
            core.addColorStop(0.6, 'rgba(0, 212, 255, 0.8)');
            core.addColorStop(1, 'transparent');
            
            ctx.fillStyle = core;
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.55, 0, Math.PI * 2);
            ctx.fill();

            // 4. RANDOM "DISCHARGE" LINES
            for(let j=0; j<3; j++) {
                ctx.beginPath();
                ctx.rotate(Math.random() * Math.PI);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.moveTo(-radius * 0.8, 0);
                ctx.lineTo(radius * 0.8, 0);
                ctx.stroke();
            }

            ctx.restore();

            // Spawn Suction Particles
            spawnInwardParticles(x, y, radius);
        }

        function spawnInwardParticles(x, y, radius) {
            for (let i = 0; i < 5; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = radius * (1.5 + Math.random());
                particles.push({
                    x, y, angle, distance,
                    speed: radius * 0.08,
                    size: Math.random() * 3
                });
            }
        }

        function updateParticles() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.distance -= p.speed; // Spiral inward
                p.angle += 0.3; // High velocity spin
                
                const px = p.x + Math.cos(p.angle) * p.distance;
                const py = p.y + Math.sin(p.angle) * p.distance;

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.distance < 5) particles.splice(i, 1);
            }
            ctx.restore();
        }

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    results.landmarks.forEach((landmarks) => {
                        // POSITION: Palm Centroid (Wrist + MCP knuckles)
                        const palmX = (landmarks[0].x + landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 5 * canvas.width;
                        const palmY = (landmarks[0].y + landmarks[5].y + landmarks[9].y + landmarks[13].y + landmarks[17].y) / 5 * canvas.height;

                        // SIZE: 2x the distance from Wrist(0) to Middle Knuckle(9)
                        const handScale = Math.hypot(
                            (landmarks[0].x - landmarks[9].x) * canvas.width,
                            (landmarks[0].y - landmarks[9].y) * canvas.height
                        );
                        
                        const constantSize = handScale * 2.0;

                        drawAnimeRasengan(palmX, palmY, constantSize);
                    });
                }
            }

            updateParticles();
            requestAnimationFrame(renderLoop);
        }

        init();
    </script>
</body>
</html>
