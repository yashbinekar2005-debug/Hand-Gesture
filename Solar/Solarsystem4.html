<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solar System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI Layer */
        #ui-layer { position: absolute; z-index: 20; width: 100%; height: 100%; pointer-events: none; }
        
        /* Webcam Feed (Hidden but active) */
        .input_video { position: absolute; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 50; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.5s;
        }

        /* Glass Cards */
        .glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .gesture-active { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); font-weight: bold; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-2xl text-white tracking-widest font-light">INITIALIZING SYSTEM</h2>
        <p class="text-gray-500 text-sm mt-2">Loading AI Models & 3D Assets...</p>
    </div>

    <!-- Hidden Video -->
    <video class="input_video"></video>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col justify-between p-6">
        
        <!-- Header -->
        <div class="w-full text-center mt-6">
            <h1 id="main-label" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 drop-shadow-lg tracking-widest uppercase transition-all duration-300">
                SOLAR SYSTEM
            </h1>
            <p id="sub-label" class="text-blue-200 mt-2 font-mono tracking-widest text-sm">OVERVIEW MODE</p>
        </div>

        <!-- Gesture Guide -->
        <div class="self-end glass p-5 w-80 pointer-events-auto">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-3">
                <h3 class="text-xs font-bold text-gray-400 uppercase">Control Module</h3>
                <span id="detected-gesture" class="text-xs font-mono text-yellow-400">DETECTING...</span>
            </div>
            
            <ul class="space-y-3 text-sm text-gray-400">
                <li id="g-none" class="flex justify-between items-center">
                    <span>🚫 No Hands</span> <span class="text-xs opacity-50">Overview Mode</span>
                </li>
                <li id="g-next" class="flex justify-between items-center">
                    <span>🖐️ One Open Palm</span> <span class="text-xs opacity-50">Next Planet</span>
                </li>
                <li id="g-zoom" class="flex justify-between items-center">
                    <span>🙌 Two Open Palms</span> <span class="text-xs opacity-50">Max Zoom</span>
                </li>
                <li id="g-fast" class="flex justify-between items-center">
                    <span>✊ Closed Fist</span> <span class="text-xs opacity-50">Turbo Speed</span>
                </li>
                <li id="g-reset" class="flex justify-between items-center">
                    <span>✌️ Peace Sign</span> <span class="text-xs opacity-50">Normal Speed</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const config = {
            camSmoothness: 0.04,
            overviewPos: { x: 0, y: 180, z: 0 }, // Top-down view
            debounceTime: 1000, // ms between cycling planets
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        const state = {
            mode: 'OVERVIEW', // 'OVERVIEW' | 'FOCUS'
            currentPlanetIdx: 2, // Start at Earth (Mercury=0, Venus=1, Earth=2...)
            zoomLevel: 'NORMAL', // 'NORMAL' | 'MAX'
            speedMultiplier: 1.0,
            lastGestureTime: 0,
            camLookAt: new THREE.Vector3(0,0,0)
        };

        // ==========================================
        // THREE.JS SETUP
        // ==========================================
        let scene, camera, renderer, sun;
        let planets = [];
        let stars;
        
        function initThree() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.001);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 180, 0); // Start high
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambient);
            
            const sunLight = new THREE.PointLight(0xffffff, 2.0, 400);
            scene.add(sunLight);

            createUniverse();
            animate();
        }

        function createUniverse() {
            // 1. Sun
            const sunGeo = new THREE.SphereGeometry(12, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
            sun = new THREE.Mesh(sunGeo, sunMat);
            // Sun Glow
            const glowGeo = new THREE.SphereGeometry(14, 64, 64);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3, side: THREE.BackSide });
            sun.add(new THREE.Mesh(glowGeo, glowMat));
            scene.add(sun);

            // 2. Planets (Mercury to Neptune)
            // Note: Distances and sizes are stylized, not to scale, for visualization
            const planetData = [
                { name: "MERCURY", size: 1.5, dist: 25, color: 0xA5A5A5, speed: 0.02 },
                { name: "VENUS", size: 2.2, dist: 35, color: 0xE3BB76, speed: 0.015 },
                { name: "EARTH", size: 2.5, dist: 50, color: 0x2233FF, speed: 0.01 },
                { name: "MARS", size: 1.8, dist: 65, color: 0xFF4500, speed: 0.008 },
                { name: "JUPITER", size: 6.0, dist: 90, color: 0xD8CA9D, speed: 0.005 },
                { name: "SATURN", size: 5.0, dist: 120, color: 0xC5A16F, speed: 0.003, ring: true },
                { name: "URANUS", size: 3.5, dist: 150, color: 0x4FD0E7, speed: 0.002 },
                { name: "NEPTUNE", size: 3.4, dist: 175, color: 0x2442A7, speed: 0.0018 }
            ];

            planetData.forEach((p) => {
                // Orbit Group (Pivot)
                const orbitGroup = new THREE.Group();
                scene.add(orbitGroup);

                // Planet Mesh
                const geo = new THREE.SphereGeometry(p.size, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ color: p.color, shininess: 20 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(p.dist, 0, 0); // Offset X
                orbitGroup.add(mesh);

                // Ring (Saturn)
                if(p.ring) {
                    const ringGeo = new THREE.RingGeometry(p.size * 1.4, p.size * 2.2, 32);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0x998877, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    mesh.add(ring);
                }

                // Orbit Path (Visual Line)
                const pathGeo = new THREE.RingGeometry(p.dist - 0.2, p.dist + 0.2, 128);
                const pathMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.08 });
                const path = new THREE.Mesh(pathGeo, pathMat);
                path.rotation.x = Math.PI / 2;
                scene.add(path);

                planets.push({
                    mesh: mesh,
                    group: orbitGroup,
                    data: p,
                    angle: Math.random() * Math.PI * 2
                });
            });

            // 3. Stars
            const starGeo = new THREE.BufferGeometry();
            const starCount = 3000;
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) {
                posArray[i] = (Math.random() - 0.5) * 800;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.6, color: 0xffffff });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
        }

        // ==========================================
        // ANIMATION LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // 1. Physics (Orbits)
            planets.forEach(p => {
                // Self rotation
                p.mesh.rotation.y += 0.01;
                // Orbit rotation
                p.group.rotation.y += p.data.speed * state.speedMultiplier;
            });

            // 2. Camera Logic
            updateCamera();

            renderer.render(scene, camera);
        }

        function updateCamera() {
            let targetPos = new THREE.Vector3();
            let lookAtPos = new THREE.Vector3();

            if (state.mode === 'OVERVIEW') {
                // High above view
                targetPos.set(0, 150, 0.1); // Slight Z offset to prevent LookAt flipping
                lookAtPos.set(0, 0, 0);
            } else {
                // Focus Mode
                const targetPlanet = planets[state.currentPlanetIdx];
                
                // Get absolute position of planet
                const planetWorldPos = new THREE.Vector3();
                targetPlanet.mesh.getWorldPosition(planetWorldPos);
                lookAtPos.copy(planetWorldPos);

                // Determine camera offset based on orbit angle
                // We want camera 'behind' and 'above' the planet relative to its movement
                const angle = targetPlanet.group.rotation.y;
                
                let dist, height;

                if (state.zoomLevel === 'MAX') {
                    // Two hands: Very close
                    dist = targetPlanet.data.size * 2.5;
                    height = targetPlanet.data.size * 0.5;
                } else {
                    // Normal focus
                    dist = targetPlanet.data.size * 6 + 10;
                    height = targetPlanet.data.size * 2 + 5;
                }

                // Calculate position relative to rotation (Lagging behind slightly visually)
                // x = sin(angle), z = cos(angle) moves along the circle
                const offsetX = Math.sin(angle) * dist;
                const offsetZ = Math.cos(angle) * dist;

                targetPos.set(
                    planetWorldPos.x + offsetX,
                    planetWorldPos.y + height,
                    planetWorldPos.z + offsetZ
                );
            }

            // Smooth Transitions
            camera.position.lerp(targetPos, config.camSmoothness);
            state.camLookAt.lerp(lookAtPos, config.camSmoothness);
            camera.lookAt(state.camLookAt);
        }

        // ==========================================
        // MEDIAPIPE LOGIC
        // ==========================================
        
        function onResults(results) {
            // Remove Loader
            const loader = document.getElementById('loader');
            if (loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }

            const multiHandLandmarks = results.multiHandLandmarks;
            let gesture = "NONE";

            // Logic 5: No Hands Detected -> Overview
            if (!multiHandLandmarks || multiHandLandmarks.length === 0) {
                gesture = "NONE";
                if(state.mode !== 'OVERVIEW') {
                    state.mode = 'OVERVIEW';
                    state.speedMultiplier = 1.0;
                    updateUI(gesture);
                }
                return;
            }

            // Logic 4: Two Hands Detected
            if (multiHandLandmarks.length === 2) {
                const hand1 = getHandShape(multiHandLandmarks[0]);
                const hand2 = getHandShape(multiHandLandmarks[1]);
                
                if (hand1 === 'OPEN_PALM' && hand2 === 'OPEN_PALM') {
                    gesture = "TWO_PALMS";
                }
            } 
            // Single Hand Logic
            else if (multiHandLandmarks.length === 1) {
                const shape = getHandShape(multiHandLandmarks[0]);
                if (shape === 'OPEN_PALM') gesture = "OPEN_PALM";
                else if (shape === 'CLOSED_FIST') gesture = "CLOSED_FIST";
                else if (shape === 'PEACE') gesture = "PEACE";
            }

            handleGestureAction(gesture);
            updateUI(gesture);
        }

        function getHandShape(landmarks) {
            const isExtended = (tip, pip) => {
                const wrist = landmarks[0];
                const dTip = Math.hypot(landmarks[tip].x - wrist.x, landmarks[tip].y - wrist.y);
                const dPip = Math.hypot(landmarks[pip].x - wrist.x, landmarks[pip].y - wrist.y);
                return dTip > dPip;
            };

            const thumb = isExtended(4, 2);
            const index = isExtended(8, 6);
            const middle = isExtended(12, 10);
            const ring = isExtended(16, 14);
            const pinky = isExtended(20, 18);
            
            const count = [thumb, index, middle, ring, pinky].filter(Boolean).length;

            if (count === 5) return 'OPEN_PALM';
            if (count === 0) return 'CLOSED_FIST';
            if (index && middle && !ring && !pinky) return 'PEACE';
            return 'UNKNOWN';
        }

        function handleGestureAction(gesture) {
            const now = Date.now();

            // 1. Two Palms -> Max Zoom (Priority)
            if (gesture === "TWO_PALMS") {
                state.mode = 'FOCUS'; // Ensure we are in focus
                state.zoomLevel = 'MAX';
            }
            // 2. Open Palm -> Next Planet
            else if (gesture === "OPEN_PALM") {
                state.mode = 'FOCUS'; // Enter focus mode
                if (now - state.lastGestureTime > config.debounceTime) {
                    state.currentPlanetIdx = (state.currentPlanetIdx + 1) % planets.length;
                    state.lastGestureTime = now;
                    state.zoomLevel = 'NORMAL'; // Reset zoom on switch
                }
            }
            // 3. Fist -> Fast Spin
            else if (gesture === "CLOSED_FIST") {
                // Must be in focus mode for this to make visual sense usually, but logic allows global speedup
                state.speedMultiplier = 3.0;
            }
            // 4. Peace -> Reset
            else if (gesture === "PEACE") {
                if (state.mode === 'FOCUS') {
                    state.zoomLevel = 'NORMAL';
                    state.speedMultiplier = 1.0;
                }
            }

            // Default Speed Reset if not Fist
            if (gesture !== "CLOSED_FIST") {
                state.speedMultiplier = 1.0;
            }
        }

        // ==========================================
        // UI UPDATES
        // ==========================================
        function updateUI(gesture) {
            // Highlights
            const ids = {
                'NONE': 'g-none',
                'OPEN_PALM': 'g-next',
                'TWO_PALMS': 'g-zoom',
                'CLOSED_FIST': 'g-fast',
                'PEACE': 'g-reset'
            };

            // Clear all
            Object.values(ids).forEach(id => {
                document.getElementById(id).classList.remove('gesture-active');
            });
            
            // Set Active
            if(ids[gesture]) document.getElementById(ids[gesture]).classList.add('gesture-active');

            document.getElementById('detected-gesture').innerText = gesture;

            // Labels
            const main = document.getElementById('main-label');
            const sub = document.getElementById('sub-label');

            if (state.mode === 'OVERVIEW') {
                main.innerText = "SOLAR SYSTEM";
                sub.innerText = "OVERVIEW MODE";
            } else {
                main.innerText = planets[state.currentPlanetIdx].data.name;
                if (state.zoomLevel === 'MAX') sub.innerText = "MAXIMUM ZOOM";
                else if (state.speedMultiplier > 1) sub.innerText = "TURBO SPEED";
                else sub.innerText = "ORBITING";
            }
        }

        // ==========================================
        // INIT
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();

        // MediaPipe Init
        const videoElement = document.querySelector('.input_video');
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2, // Enable two hand detection
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        cameraUtils.start();

    </script>
</body>
</html>
