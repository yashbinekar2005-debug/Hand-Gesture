<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobi AR: Rasengan</title>
    <!-- Dark Shinobi Aesthetic CSS -->
    <style>
        :root {
            --chakra-blue: #00d2ff;
            --leaf-village-dark: #0a0a0c;
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.8);
        }

        body {
            margin: 0;
            background-color: var(--leaf-village-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--chakra-blue);
            box-shadow: var(--neon-glow);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--chakra-blue);
        }

        .status-box {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        #status-indicator {
            font-weight: bold;
            color: #ff4444;
        }

        #status-indicator.detected {
            color: #00ff88;
        }

        button {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: var(--chakra-blue);
            border-color: var(--chakra-blue);
            box-shadow: var(--neon-glow);
        }

        #video-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror effect to match video */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Shinobi AR Interface</h1>
        <div class="status-box">Status: <span id="status-indicator">HIDDEN</span></div>
        <button id="startButton">Initialize Camera</button>
    </div>

    <div id="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- MediaPipe Tasks Vision CDN -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startButton");
        const statusText = document.getElementById("status-indicator");

        let handLandmarker;
        let runningMode = "VIDEO";
        let rasenganRotation = 0;

        // Initialize MediaPipe
        async function initHandTracking() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: runningMode,
                numHands: 1
            });
            console.log("Hand Landmarker Loaded");
        }

        // Setup Webcam
        startBtn.addEventListener("click", async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                predictWebcam();
            });
            startBtn.style.display = "none";
        });

        // The Rasengan Drawing Logic
        function drawRasengan(x, y, radius) {
            rasenganRotation += 0.15; // Smooth spiral speed
            
            ctx.save();
            ctx.translate(x, y);
            ctx.globalCompositeOperation = 'lighter'; // Makes overlapping colors "glow"

            // 1. Outer Glow Aura
            const aura = ctx.createRadialGradient(0, 0, radius * 0.5, 0, 0, radius * 1.5);
            aura.addColorStop(0, 'rgba(0, 210, 255, 0.3)');
            aura.addColorStop(1, 'rgba(0, 100, 255, 0)');
            ctx.fillStyle = aura;
            ctx.beginPath();
            ctx.arc(0, 0, radius * 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 2. Swirling Layers
            for (let i = 0; i < 4; i++) {
                ctx.rotate(rasenganRotation * (i + 1) * 0.2);
                ctx.strokeStyle = 'rgba(0, 210, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'cyan';
                
                ctx.beginPath();
                // Create erratic spiral-like arcs
                ctx.ellipse(0, 0, radius * (0.8 + i*0.1), radius * (0.4 + i*0.05), 0, 0, Math.PI * 1.5);
                ctx.stroke();
            }

            // 3. Bright White Core
            const core = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.6);
            core.addColorStop(0, '#ffffff');
            core.addColorStop(0.4, 'rgba(200, 240, 255, 0.9)');
            core.addColorStop(1, 'rgba(0, 210, 255, 0)');
            
            ctx.fillStyle = core;
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.7, 0, Math.PI * 2);
            ctx.fill();

            // 4. Random Sparking Particles
            for(let j=0; j<5; j++) {
                let px = (Math.random() - 0.5) * radius * 1.2;
                let py = (Math.random() - 0.5) * radius * 1.2;
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(px, py, 1.5, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }

        // Detection Logic
        let lastVideoTime = -1;
        async function predictWebcam() {
            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    statusText.innerText = "DETECTED";
                    statusText.className = "detected";

                    // GESTURE LOGIC: Flat Palm Detection
                    // Check if tips (8,12,16,20) are further from wrist (0) than knuckles (5,9,13,17)
                    const isFlatPalm = 
                        landmarks[8].y < landmarks[5].y && 
                        landmarks[12].y < landmarks[9].y &&
                        landmarks[16].y < landmarks[13].y;

                    if (isFlatPalm) {
                        // POSITION LOGIC: Palm Center
                        // Center point using Middle Finger MCP (9) and Wrist (0)
                        const palmX = landmarks[9].x * canvas.width;
                        const palmY = landmarks[9].y * canvas.height;
                        
                        // Calculate radius based on hand scale (distance from wrist to middle knuckle)
                        const handScale = Math.hypot(
                            (landmarks[0].x - landmarks[9].x) * canvas.width,
                            (landmarks[0].y - landmarks[9].y) * canvas.height
                        );
                        
                        drawRasengan(palmX, palmY, handScale * 0.6);
                    }
                } else {
                    statusText.innerText = "HIDDEN";
                    statusText.className = "";
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        initHandTracking();
    </script>
</body>
</html>
