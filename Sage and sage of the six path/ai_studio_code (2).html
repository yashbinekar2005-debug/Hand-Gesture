<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six Paths Senjutsu: Rikudō Sennin Mode</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Permanent+Marker&display=swap" rel="stylesheet">

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --chakra-gold: #FFD700;
            --void-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Video/Canvas Container */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .input_video { display: none; }

        .output_canvas {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1); /* Mirror Mode */
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            color: var(--chakra-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 2px 2px 0 #000;
            font-size: 2rem;
            margin-top: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
        }

        .sub-text {
            font-size: 0.8rem;
            color: #fff;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 5px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* Transcended Button */
        #transcend-btn {
            pointer-events: auto;
            background: transparent;
            color: var(--chakra-gold);
            border: 2px solid var(--chakra-gold);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            margin-bottom: 50px;
            transition: all 0.5s ease;
            text-shadow: 0 0 10px var(--chakra-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        #transcend-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        #gesture-hint {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #ccc;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Screen Flash Effect */
        #flash-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
            z-index: 20;
        }

    </style>
</head>
<body>

<div id="container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    <div id="flash-overlay"></div>

    <div id="ui-layer">
        <div>
            <h1>Six Paths Senjutsu</h1>
            <div class="sub-text">RIKUDŌ SENNIN MODE</div>
        </div>
        
        <div style="text-align: center; width: 100%;">
            <div id="gesture-hint">👆 Jutsu Sign: Raise Left Index & Middle Finger</div>
            <button id="transcend-btn" onclick="app.triggerTransformation()">TRANSCEND</button>
        </div>
    </div>
</div>

<script>
/**
 * -----------------------------------------------------------------------
 * CONFIGURATION & CONSTANTS
 * -----------------------------------------------------------------------
 */
const CONFIG = {
    colors: {
        gold: '#FFD700',
        goldGlow: 'rgba(255, 215, 0, 0.4)', // Lower opacity for visibility
        orbGradient: ['#555', '#111', '#000'],
    },
    physics: {
        orbLag: 0.05, 
        orbRadius: 25,
        orbDistance: 220
    }
};

/**
 * -----------------------------------------------------------------------
 * MATH & UTILS
 * -----------------------------------------------------------------------
 */
function lerp(start, end, amt) {
    return (1 - amt) * start + amt * end;
}

// Draw a Magatama (comma shape)
function drawMagatama(ctx, x, y, size, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.fillStyle = "#000"; 
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.moveTo(size * 0.8, -size * 0.2);
    ctx.bezierCurveTo(size * 2, -size * 1.5, size * 0.5, -size * 2.5, 0, -size * 3);
    ctx.lineTo(0, -size);
    ctx.fill();
    ctx.restore();
}

/**
 * -----------------------------------------------------------------------
 * TRUTH-SEEKER ORB SYSTEM
 * -----------------------------------------------------------------------
 */
class OrbSystem {
    constructor() {
        this.orbs = [];
        this.count = 9;
        this.initOrbs();
    }

    initOrbs() {
        for(let i=0; i<this.count; i++) {
            this.orbs.push({
                x: 0, y: 0, 
                targetX: 0, targetY: 0,
                angle: (i / this.count) * Math.PI * 2,
                floatOffset: Math.random() * Math.PI * 2
            });
        }
    }

    update(centerX, centerY, scale, isActive) {
        if (!isActive) return;
        const anchorX = centerX;
        const anchorY = centerY + (100 * scale); 
        const radius = CONFIG.physics.orbDistance * scale;

        this.orbs.forEach((orb, i) => {
            orb.angle += 0.005; 
            orb.floatOffset += 0.05;
            orb.targetX = anchorX + Math.cos(orb.angle) * radius;
            orb.targetY = anchorY + Math.sin(orb.angle) * radius + Math.sin(orb.floatOffset)*10;
            orb.x = lerp(orb.x, orb.targetX, CONFIG.physics.orbLag);
