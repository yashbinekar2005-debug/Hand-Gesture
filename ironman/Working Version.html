<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Mark-85: Nanotech AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { transform: scaleX(-1); position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        
        /* Stark HUD */
        .hud {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            color: #00d2ff; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px #00d2ff; pointer-events: none;
        }
        .bar-container { width: 250px; height: 4px; background: rgba(0, 40, 60, 0.4); border: 1px solid #00d2ff; margin: 10px 0; }
        .fill { height: 100%; width: 0%; background: #00d2ff; box-shadow: 0 0 15px #00d2ff; transition: width 0.1s; }
        #deploy-bar { background: #ff3300; box-shadow: 0 0 15px #ff3300; border-color: #ff3300; }
        
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0, 50, 100, 0.2) 100%);
            z-index: 15; opacity: 0; transition: opacity 1s; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <div id="vignette"></div>
    <div class="hud">
        <div id="status">Scanning Pilot...</div>
        <div class="bar-container"><div id="scan-bar" class="fill"></div></div>
        <div id="suit-label" style="opacity:0">Nanotech Integrity</div>
        <div class="bar-container" id="deploy-cont" style="opacity:0"><div id="deploy-bar" class="fill"></div></div>
    </div>
</div>

<script>
// --- SHADERS ---
const vertexShader = `
    uniform float uTime;
    uniform float uProgress;
    attribute vec3 targetPos;
    attribute vec3 aColor;
    varying vec3 vColor;

    void main() {
        // 1. Vortex Physics (Rasengan Style for Idle)
        float angle = uTime * 6.0 + position.y * 12.0;
        float radius = 0.12 + sin(uTime * 2.0) * 0.04;
        vec3 idlePos = vec3(cos(angle) * radius, position.y * 0.2, sin(angle) * radius);

        // 2. Linear Interpolation to Body Segments
        vec3 finalPos = mix(idlePos, targetPos, uProgress);
        
        // 3. Cinematic Color: Cyan Energy -> Mark 85 Crimson/Gold
        vColor = mix(vec3(0.0, 0.9, 1.0), aColor, uProgress);

        vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
        gl_PointSize = (18.0 / -mvPosition.z) * (1.1 + uProgress);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragmentShader = `
    varying vec3 vColor;
    void main() {
        float d = distance(gl_PointCoord, vec2(0.5));
        if (d > 0.5) discard;
        gl_FragColor = vec4(vColor, 1.0 - (d * 2.0));
    }
`;

// --- ENGINE STATE ---
let scene, camera, renderer, particles, particleMat;
let poseResults = null;
let suitProgress = 0;
let suitState = "SCANNING"; // SCANNING, READY, DEPLOYING, ACTIVE, RETRACTING
let bodyScale = 1.0;
let smoothedChest = new THREE.Vector3();
let isHandTouchingHead = false; // Toggle Lock

const PARTICLE_COUNT = 15000;

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(PARTICLE_COUNT * 3);
    const tar = new Float32Array(PARTICLE_COUNT * 3);
    const col = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        pos[i*3] = (Math.random()-0.5) * 0.1;
        pos[i*3+1] = (Math.random()-0.5) * 0.1;
        pos[i*3+2] = (Math.random()-0.5) * 0.1;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geometry.setAttribute('targetPos', new THREE.BufferAttribute(tar, 3));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(col, 3));

    particleMat = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: { uTime: { value: 0 }, uProgress: { value: 0 } },
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });

    particles = new THREE.Points(geometry, particleMat);
    scene.add(particles);
    
    animate();
}

function onResults(results) {
    if (!results.poseLandmarks || !particles) return;
    const lm = results.poseLandmarks;

    // 1. Initial Scanning HUD
    let scanBar = document.getElementById('scan-bar');
    let scanP = parseFloat(scanBar.style.width) || 0;
    if (scanP < 100) {
        scanBar.style.width = (scanP + 0.5) + "%";
    } else if (suitState === "SCANNING") {
        suitState = "READY";
        document.getElementById('status').innerText = "Pilot Verified. Tap Right Ear.";
    }

    // 2. Biometric Positioning & Scaling
    const chestX = (0.5 - (lm[11].x + lm[12].x) / 2) * 6;
    const chestY = (0.5 - (lm[11].y + lm[12].y) / 2) * 6;
    smoothedChest.lerp(new THREE.Vector3(chestX, chestY, 0), 0.2);
    particles.position.copy(smoothedChest);

    const sWidth = Math.abs(lm[11].x - lm[12].x);
    bodyScale = sWidth * 12; // Adaptive scale based on user distance
    particles.scale.set(bodyScale, bodyScale, bodyScale);

    // 3. Segmented Anatomical Mapping
    updateAnatomicalMapping(lm);

    // 4. IMPROVED DISCRETE TAP DETECTION
    const rightIndex = lm[20];
    const rightEar = lm[8];
    const distToEar = Math.hypot(rightIndex.x - rightEar.x, rightIndex.y - rightEar.y);

    if (distToEar < 0.1) {
        if (!isHandTouchingHead) {
            isHandTouchingHead = true; // Lock
            handleTapLogic();
        }
    } else {
        isHandTouchingHead = false; // Unlock when hand moves away
    }
}

function handleTapLogic() {
    if (suitState === "READY") {
        suitState = "DEPLOYING";
        document.getElementById('suit-label').style.opacity = 1;
        document.getElementById('deploy-cont').style.opacity = 1;
    } else if (suitState === "ACTIVE") {
        suitState = "RETRACTING";
    }
}

function updateAnatomicalMapping(lm) {
    const targets = particles.geometry.attributes.targetPos.array;
    const colors = particles.geometry.attributes.aColor.array;
    
    const toLocal = (p) => ({ 
        x: ((0.5 - p.x) * 6 - smoothedChest.x) / bodyScale, 
        y: ((0.5 - p.y) * 6 - smoothedChest.y) / bodyScale,
        z: -p.z * 1.5
    });

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        let pIdx = i * 3;
        let p;
        let color = [0.7, 0.05, 0.05]; // Mark 85 Crimson

        if (i < PARTICLE_COUNT * 0.25) { 
            // HELMET SHAPE (Ellipsoid on Head)
            const head = toLocal(lm[0]);
            const ang = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            p = {
                x: head.x + Math.sin(phi) * Math.cos(ang) * 0.22,
                y: head.y + Math.cos(phi) * 0.28,
                z: head.z + Math.sin(phi) * Math.sin(ang) * 0.22
            };
            if (Math.abs(ang - Math.PI/2) < 0.75) color = [0.8, 0.6, 0.1]; // Gold Faceplate

        } else if (i < PARTICLE_COUNT * 0.6) {
            // CHEST PLATE (Tapered Rectangle)
            const shL = toLocal(lm[11]), shR = toLocal(lm[12]);
            const midX = (shL.x + shR.x)/2;
            const midY = (shL.y + shR.y)/2;
            p = {
                x: midX + (Math.random()-0.5) * 0.65,
                y: midY - 0.2 - Math.random() * 0.6,
                z: Math.random() * 0.18
            };
        } else {
            // GAUNTLETS (Interpolated Cylinders on Arms)
            const side = (i % 2 === 0) ? [lm[12], lm[14], lm[16]] : [lm[11], lm[13], lm[15]];
            const t = Math.random();
            const start = toLocal(side[1]); // Elbow
            const end = toLocal(side[2]);   // Wrist
            p = {
                x: start.x + (end.x - start.x) * t + (Math.random()-0.5)*0.18,
                y: start.y + (end.y - start.y) * t + (Math.random()-0.5)*0.18,
                z: start.z + (end.z - start.z) * t + (Math.random()-0.5)*0.18
            };
        }

        targets[pIdx] = p.x; targets[pIdx+1] = p.y; targets[pIdx+2] = p.z;
        colors[pIdx] = color[0]; colors[pIdx+1] = color[1]; colors[pIdx+2] = color[2];
    }
    particles.geometry.attributes.targetPos.needsUpdate = true;
    particles.geometry.attributes.aColor.needsUpdate = true;
}

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    if (particleMat) particleMat.uniforms.uTime.value = time;

    // Deployment State Machine
    if (suitState === "DEPLOYING") {
        suitProgress += (1 / (15 * 60)); // 15 Seconds
        document.getElementById('status').innerText = "Nanotech Assembly: Mark 85";
        if (suitProgress >= 1) { 
            suitProgress = 1; suitState = "ACTIVE"; 
            document.getElementById('status').innerText = "Systems Online";
            document.getElementById('vignette').style.opacity = 1;
        }
    } else if (suitState === "RETRACTING") {
        suitProgress -= (1 / (8 * 60)); // 8 Seconds
        document.getElementById('status').innerText = "Retracting Systems...";
        if (suitProgress <= 0) { 
            suitProgress = 0; suitState = "READY"; 
            document.getElementById('status').innerText = "Pilot Verified. Tap Right Ear.";
            document.getElementById('vignette').style.opacity = 0;
        }
    }
    
    document.getElementById('deploy-bar').style.width = (suitProgress * 100) + "%";
    if (particleMat) particleMat.uniforms.uProgress.value = suitProgress;
    
    renderer.render(scene, camera);
}

// MediaPipe & Lifecycle
const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
pose.onResults(onResults);

new Camera(document.getElementById('input_video'), {
    onFrame: async () => { await pose.send({image: document.getElementById('input_video')}); },
    width: 1280, height: 720
}).start();

initThree();
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>
</body>
</html>
