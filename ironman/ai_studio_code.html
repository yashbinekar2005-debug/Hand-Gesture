<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Nanotech: Volume Assembly</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { transform: scaleX(-1); position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        
        /* HUD Interface */
        .hud-overlay {
            position: absolute; top: 30px; left: 30px; width: 320px;
            z-index: 20; color: #00d2ff; text-shadow: 0 0 10px #00d2ff;
        }
        .bar-container { width: 100%; height: 6px; background: rgba(0, 50, 100, 0.4); border: 1px solid #00d2ff; margin: 8px 0; border-radius: 3px; }
        .bar-fill { height: 100%; width: 0%; background: #00d2ff; box-shadow: 0 0 15px #00d2ff; transition: width 0.1s; }
        #integrity-fill { background: #ff3300; box-shadow: 0 0 15px #ff3300; }
        .label { font-size: 11px; letter-spacing: 2px; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="container">
    <video id="input_video"></video>
    <div class="hud-overlay">
        <div class="label">BIOMETRIC SCANNING...</div>
        <div class="bar-container"><div id="scan-bar" class="bar-fill"></div></div>
        
        <div class="label" style="margin-top:20px;">NANOTECH INTEGRITY</div>
        <div class="bar-container"><div id="integrity-fill" class="bar-fill"></div></div>
        <div id="status-text" class="label" style="color:#fff;">READY FOR DEPLOYMENT</div>
    </div>
</div>

<script>
// --- SHADERS: Rasengan Energy to Solid Metal ---
const vertexShader = `
    varying vec3 vColor;
    attribute vec3 targetPos;
    uniform float uProgress;
    uniform float uTime;
    
    void main() {
        // 1. Initial State: Swirling Energy Vortex in the Arc Reactor (Center)
        float angle = uTime * 6.0 + position.y * 15.0;
        float r = 0.15 + sin(uTime * 2.0) * 0.05;
        vec3 idlePos = vec3(cos(angle) * r, position.y * 0.2, sin(angle) * r);
        
        // 2. Linear Interpolation (Lerp) to target body volume
        vec3 finalPos = mix(idlePos, targetPos, uProgress);
        
        // 3. Size & Color Logic
        vColor = mix(vec3(0.0, 0.8, 1.0), vec3(0.8, 0.0, 0.0), uProgress);
        vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
        gl_PointSize = (12.0 / -mvPosition.z) * (1.2 + uProgress);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragmentShader = `
    varying vec3 vColor;
    void main() {
        float d = distance(gl_PointCoord, vec2(0.5));
        if (d > 0.5) discard;
        gl_FragColor = vec4(vColor, 1.0 - (d * 2.5));
    }
`;

// --- THREE.JS CORE ---
let scene, camera, renderer, particles, particleMat;
let suitState = "IDLE"; 
let suitProgress = 0;
let smoothedChest = new THREE.Vector3();

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const count = 8000; // High particle count for "Whole Body" coverage
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const tar = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        pos[i*3] = (Math.random()-0.5)*0.1;
        pos[i*3+1] = (Math.random()-0.5)*0.1;
        pos[i*3+2] = (Math.random()-0.5)*0.1;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geometry.setAttribute('targetPos', new THREE.BufferAttribute(tar, 3));

    particleMat = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: { uProgress: { value: 0 }, uTime: { value: 0 } },
        transparent: true, blending: THREE.AdditiveBlending
    });

    particles = new THREE.Points(geometry, particleMat);
    scene.add(particles);
    animate();
}

// --- BODY SCANNING & VISIBILITY LOGIC ---
function updateBodyScanning(lm) {
    const targets = particles.geometry.attributes.targetPos.array;
    const count = targets.length / 3;

    // Center point: Arc Reactor (Chest)
    const chestX = (0.5 - (lm[11].x + lm[12].x) / 2) * 6;
    const chestY = (0.5 - (lm[11].y + lm[12].y) / 2) * 6;
    smoothedChest.lerp(new THREE.Vector3(chestX, chestY, 0), 0.2);
    particles.position.copy(smoothedChest);

    // Scaling based on shoulder width
    const sWidth = Math.hypot(lm[11].x - lm[12].x, lm[11].y - lm[12].y);
    const sScale = sWidth * 9.5;
    particles.scale.set(sScale, sScale, sScale);

    for (let i = 0; i < count; i++) {
        let section = i % 4;
        let base, spread = 0.28;

        if (section === 0) { // HEAD
            base = lm[0]; spread = 0.18;
        } else if (section === 1) { // CHEST/ARMOR
            base = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[23].y)/2.2, z: lm[11].z };
        } else if (section === 2) { // LEFT ARM (Shoulder to Wrist)
            base = i % 2 === 0 ? lm[11] : lm[15];
        } else { // RIGHT ARM (Shoulder to Wrist)
            base = i % 2 === 0 ? lm[12] : lm[16];
        }

        // The "Volume" Logic: Scattering particles around the landmark
        targets[i*3] = (0.5 - base.x) * 6 - smoothedChest.x + (Math.random()-0.5)*spread;
        targets[i*3+1] = (0.5 - base.y) * 6 - smoothedChest.y + (Math.random()-0.5)*spread;
        targets[i*3+2] = (-base.z * 2.5) + (Math.random()-0.5)*spread;
    }
    particles.geometry.attributes.targetPos.needsUpdate = true;
}

function onResults(results) {
    if (!results.poseLandmarks) {
        document.getElementById('scan-bar').style.width = "10%";
        return;
    }
    document.getElementById('scan-bar').style.width = "100%";
    const lm = results.poseLandmarks;

    updateBodyScanning(lm);

    // Gestures
    const wristR = lm[16];
    const earR = lm[8];
    const chest = { x: (lm[11].x+lm[12].x)/2, y: (lm[11].y+lm[12].y)/2 };

    if (Math.hypot(wristR.x - chest.x, wristR.y - chest.y) < 0.12 && suitState === "IDLE") suitState = "DEPLOYING";
    if (Math.hypot(wristR.x - earR.x, wristR.y - earR.y) < 0.1 && suitState === "ACTIVE") suitState = "RETRACTING";
}

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    particleMat.uniforms.uTime.value = time;

    if (suitState === "DEPLOYING") {
        suitProgress += (1 / (15 * 60)); // 15 Seconds
        if (suitProgress >= 1) { suitProgress = 1; suitState = "ACTIVE"; }
    } else if (suitState === "RETRACTING") {
        suitProgress -= (1 / (8 * 60)); // 8 Seconds
        if (suitProgress <= 0) { suitProgress = 0; suitState = "IDLE"; }
    }

    particleMat.uniforms.uProgress.value = suitProgress;
    document.getElementById('integrity-fill').style.width = (suitProgress * 100) + "%";
    document.getElementById('status-text').innerText = `SYSTEM: ${suitState}`;
    
    renderer.render(scene, camera);
}

// --- MEDIAPIPE INITIALIZATION ---
const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
pose.onResults(onResults);

const video = document.getElementById('input_video');
new Camera(video, {
    onFrame: async () => { await pose.send({image: video}); },
    width: 1280, height: 720
}).start();

initThree();
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
